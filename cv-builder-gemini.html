<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pengaturan Dasar untuk A4 */
        :root {
            --a4-width: 210mm;
            --a4-height: 297mm;
        }

        /* Memaksa warna background tercetak saat print */
        * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* Styling area pratinjau agar seperti kertas */
        #cv-preview-container {
            width: var(--a4-width);
            min-height: var(--a4-height);
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        /* Aturan khusus saat di-print */
        @media print {
            body {
                background: white;
                margin: 0;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            #preview-panel {
                width: 100%;
                height: auto;
                padding: 0;
                margin: 0;
                background: white;
                display: block !important;
            }

            #preview-scroll-area {
                display: block !important;
                padding: 0 !important;
                overflow: visible !important;
                flex: none !important;
            }

            #mobile-design-strip,
            #mobile-tab-bar,
            .mobile-tab-bar,
            .no-print {
                display: none !important;
            }

            #cv-preview-container {
                box-shadow: none;
                margin: 0 !important;
                margin-bottom: 0 !important;
                width: 210mm;
                height: 297mm;
                /* Menghindari halaman terpotong */
                page-break-after: avoid;
                transform: none !important;
            }

            @page {
                size: A4;
                margin: 0mm;
                /* Margin dihilangkan agar desain full-page bisa masuk */
            }
        }

        /* Desain 1: Eksekutif Klasik (Refined) */
        .design-1 {
            padding: 20mm;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #1f2937;
            background: #ffffff;
        }

        .design-1 h1 {
            font-size: 30pt;
            text-align: center;
            color: #111827;
            margin-bottom: 5px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .design-1 .contact-info {
            text-align: center;
            font-size: 9.5pt;
            color: #4b5563;
            margin-bottom: 25px;
            position: relative;
        }

        .design-1 .contact-info span {
            margin: 0 8px;
        }

        .design-1 .contact-info::after {
            content: "";
            display: block;
            width: 100%;
            height: 3px;
            border-top: 1px solid #111827;
            border-bottom: 1px solid #111827;
            margin-top: 15px;
        }

        .design-1 h2 {
            font-size: 12pt;
            text-transform: uppercase;
            color: #111827;
            border-bottom: 1px solid #d1d5db;
            padding-bottom: 4px;
            margin-top: 22px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .design-1 .item {
            margin-bottom: 16px;
        }

        .design-1 .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .design-1 .item-title {
            font-weight: bold;
            font-size: 11.5pt;
            color: #111827;
        }

        .design-1 .item-date {
            font-style: italic;
            color: #4b5563;
            font-size: 10pt;
        }

        .design-1 .item-subtitle {
            font-style: italic;
            color: #374151;
            font-size: 10.5pt;
            margin-bottom: 6px;
        }

        .design-1 p {
            font-size: 10.5pt;
            line-height: 1.6;
            margin-bottom: 8px;
            text-align: justify;
        }

        .design-1 ul {
            list-style-type: square;
            margin-left: 18px;
            font-size: 10.5pt;
            line-height: 1.6;
        }

        .design-1 ul li {
            margin-bottom: 3px;
        }

        /* Desain 2: Modern Kreatif (Sidebar Refined) */
        .design-2 {
            display: flex;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: var(--a4-height);
            background: #ffffff;
        }

        .design-2 .sidebar {
            width: 33%;
            background-color: #0f172a;
            /* Slate 900 */
            color: #f8fafc;
            padding: 18mm 12mm;
        }

        .design-2 .main-content {
            width: 67%;
            padding: 18mm 15mm;
            color: #334155;
        }

        .design-2 .avatar {
            width: 75px;
            height: 75px;
            background: #38bdf8;
            color: #0f172a;
            font-size: 28pt;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .design-2 h1 {
            font-size: 28pt;
            font-weight: 800;
            margin-bottom: 2px;
            color: #0f172a;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        .design-2 .job-title {
            font-size: 13pt;
            color: #38bdf8;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .design-2 h2 {
            font-size: 13pt;
            text-transform: uppercase;
            margin-top: 25px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .design-2 .sidebar h2 {
            border-bottom: 2px solid #1e293b;
            padding-bottom: 6px;
            color: #e2e8f0;
        }

        .design-2 .main-content h2 {
            color: #0f172a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 6px;
        }

        .design-2 .contact-item {
            margin-bottom: 12px;
            font-size: 9.5pt;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            color: #cbd5e1;
        }

        .design-2 .skills-container {
            margin-top: 15px;
        }

        .design-2 .skill-item {
            background: #1e293b;
            color: #e2e8f0;
            padding: 6px 12px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-size: 9pt;
            display: inline-block;
            border: 1px solid #334155;
            margin-right: 4px;
        }

        .design-2 .timeline-item {
            position: relative;
            padding-left: 18px;
            border-left: 2px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .design-2 .timeline-item::before {
            content: "";
            position: absolute;
            left: -6px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #38bdf8;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px #e2e8f0;
        }

        .design-2 .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .design-2 .item-title {
            font-weight: bold;
            font-size: 12pt;
            color: #0f172a;
        }

        .design-2 .item-company {
            font-weight: 600;
            color: #64748b;
            font-size: 10.5pt;
            margin-bottom: 6px;
        }

        .design-2 .item-date {
            font-size: 9.5pt;
            color: #94a3b8;
            font-weight: 500;
        }

        .design-2 p,
        .design-2 ul {
            font-size: 10pt;
            line-height: 1.6;
            color: #475569;
        }

        .design-2 ul {
            padding-left: 15px;
        }

        .design-2 ul li {
            margin-bottom: 4px;
        }

        /* Desain 3: White Minimalist & Professional */
        .design-3 {
            padding: 18mm;
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #334155;
            background: #ffffff;
        }

        .design-3 .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .design-3 h1 {
            font-size: 28pt;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .design-3 .job-title {
            font-size: 12pt;
            color: #0284c7;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 15px;
        }

        .design-3 .contact-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 9.5pt;
            color: #64748b;
            font-weight: 500;
        }

        .design-3 .section {
            display: flex;
            margin-bottom: 22px;
            border-top: 1px solid #e2e8f0;
            padding-top: 22px;
        }

        .design-3 .section-title {
            width: 25%;
            font-size: 10pt;
            font-weight: 700;
            text-transform: uppercase;
            color: #0f172a;
            letter-spacing: 1px;
            padding-right: 15px;
        }

        .design-3 .section-content {
            width: 75%;
        }

        .design-3 .item {
            margin-bottom: 20px;
        }

        .design-3 .item:last-child {
            margin-bottom: 0;
        }

        .design-3 .item-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .design-3 .item-title {
            font-weight: 800;
            font-size: 11.5pt;
            color: #0f172a;
        }

        .design-3 .item-date {
            font-size: 9.5pt;
            color: #64748b;
            font-weight: 500;
            text-align: right;
        }

        .design-3 .item-subtitle {
            font-weight: 600;
            font-size: 10.5pt;
            color: #0284c7;
            margin-bottom: 8px;
        }

        .design-3 p,
        .design-3 ul {
            font-size: 10pt;
            line-height: 1.6;
            color: #475569;
        }

        .design-3 ul {
            padding-left: 16px;
        }

        .design-3 ul li {
            margin-bottom: 4px;
        }

        .design-3 .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .design-3 .skill-tag {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #334155;
            padding: 5px 12px;
            font-size: 9.5pt;
            border-radius: 4px;
            font-weight: 500;
        }

        /* Custom Scrollbar for Form area */
        .form-area::-webkit-scrollbar {
            width: 8px;
        }

        .form-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .form-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .form-area::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Photo Upload Styles */
        .photo-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .photo-preview-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3b82f6;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .photo-preview-circle:hover {
            opacity: 0.85;
        }

        .photo-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px dashed #cbd5e1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #94a3b8;
            font-size: 11px;
            text-align: center;
            gap: 4px;
            background: #f8fafc;
            transition: border-color 0.2s, background 0.2s;
        }

        .photo-placeholder:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            color: #3b82f6;
        }

        /* Avatar in CV designs */
        .cv-photo-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #38bdf8;
            margin-bottom: 20px;
            display: block;
        }

        .cv-photo-placeholder {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #38bdf8;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        /* Design 1 photo */
        .design-1 .cv-photo-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 5px;
        }

        .design-1 .cv-photo-header img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #111827;
            flex-shrink: 0;
        }

        .design-1 .cv-photo-header .header-text {
            flex: 1;
        }

        /* Design 3 photo */
        .design-3 .header {
            display: flex;
            align-items: center;
            gap: 20px;
            text-align: left;
            margin-bottom: 30px;
        }

        .design-3 .header img.photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0284c7;
            flex-shrink: 0;
        }

        .design-3 .header .header-text {
            flex: 1;
        }

        .design-3 .header h1 {
            text-align: left;
        }

        .design-3 .job-title {
            text-align: left;
        }

        .design-3 .contact-bar {
            justify-content: flex-start;
        }

        /* ===========================
           RESPONSIVE / MOBILE STYLES
           =========================== */

        /* Mobile design strip — hidden on desktop */
        #mobile-design-strip { display: none; }

        @media print and (max-width: 768px) {
            #mobile-design-strip,
            .mobile-tab-bar {
                display: none !important;
            }
        }

        @media (max-width: 768px) {
            /* Bottom tab bar */
            .mobile-tab-bar {
                display: flex;
                background: white;
                border-top: 1px solid #e5e7eb;
                flex-shrink: 0;
                z-index: 30;
            }

            .mobile-tab-btn {
                flex: 1;
                padding: 11px 8px 9px;
                font-size: 12px;
                font-weight: 600;
                color: #6b7280;
                background: white;
                border: none;
                border-top: 3px solid transparent;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
                transition: color 0.2s, border-color 0.2s, background 0.2s;
                -webkit-tap-highlight-color: transparent;
            }

            .mobile-tab-btn.tab-active {
                color: #2563eb;
                border-top-color: #2563eb;
                background: #eff6ff;
            }

            /* Main workspace stacks on mobile */
            #main-workspace {
                display: block !important;
                overflow: hidden;
            }

            /* Both panels hidden by default; shown by .mobile-panel-active */
            #form-panel {
                width: 100% !important;
                height: 100%;
                display: none;
            }
            #form-panel.mobile-panel-active {
                display: flex !important;
            }

            #preview-panel {
                width: 100% !important;
                height: 100%;
                display: none;
                flex-direction: column;
            }
            #preview-panel.mobile-panel-active {
                display: flex !important;
            }

            /* Mobile design switcher strip */
            #mobile-design-strip {
                display: flex !important;
                gap: 8px;
                padding: 10px 12px;
                background: white;
                border-bottom: 1px solid #e5e7eb;
                overflow-x: auto;
                flex-shrink: 0;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            #mobile-design-strip::-webkit-scrollbar { display: none; }

            #mobile-design-strip button {
                white-space: nowrap;
                padding: 6px 16px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                border: 1.5px solid #e2e8f0;
                background: white;
                color: #374151;
                flex-shrink: 0;
                -webkit-tap-highlight-color: transparent;
                transition: background 0.15s, color 0.15s;
            }
            #mobile-design-strip button.mob-dsn-active {
                background: #2563eb;
                color: white;
                border-color: #2563eb;
            }

            /* Scrollable preview area on mobile */
            #preview-scroll-area {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                display: flex !important;
                justify-content: center;
                align-items: flex-start;
                padding: 12px 6px !important;
                -webkit-overflow-scrolling: touch;
            }

            /* A4 scale target */
            #cv-preview-container {
                transform-origin: top center;
                flex-shrink: 0;
            }
        }

        /* ===========================
           PRINT OVERRIDE (must be LAST in stylesheet so it
           wins cascade over mobile @media flex !important)
           =========================== */
        @media print {
            .no-print,
            #mobile-design-strip,
            #mobile-tab-bar,
            .mobile-tab-bar,
            .mobile-tab-btn {
                display: none !important;
                visibility: hidden !important;
            }

            #preview-panel {
                width: 100% !important;
                display: block !important;
            }

            #preview-scroll-area {
                display: block !important;
                padding: 0 !important;
                overflow: visible !important;
            }

            #cv-preview-container {
                transform: none !important;
                margin: 0 !important;
                margin-bottom: 0 !important;
                width: 210mm !important;
                height: 297mm !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>

<body class="bg-gray-100 h-screen overflow-hidden flex flex-col font-sans">

    <!-- Topbar Navbar (No Print) -->
    <nav class="bg-white shadow-sm border-b px-6 py-3 flex justify-between items-center no-print z-10 relative">
        <div class="font-bold text-xl text-blue-600 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Pembuat CV Profesional
        </div>
        <div class="flex gap-2 items-center">
            <!-- Design buttons: hidden on mobile -->
            <div class="hidden md:flex gap-2 items-center">
                <span class="text-sm text-gray-500 mr-1">Pilih Desain:</span>
                <button onclick="changeDesign(1)" id="btn-dsn-1"
                    class="px-4 py-1.5 rounded text-sm font-medium transition-colors bg-blue-600 text-white">Klasik</button>
                <button onclick="changeDesign(2)" id="btn-dsn-2"
                    class="px-4 py-1.5 rounded text-sm font-medium transition-colors bg-gray-200 text-gray-700 hover:bg-gray-300">Modern Sidebar</button>
                <button onclick="changeDesign(3)" id="btn-dsn-3"
                    class="px-4 py-1.5 rounded text-sm font-medium transition-colors bg-gray-200 text-gray-700 hover:bg-gray-300">Minimalis</button>
                <div class="w-px h-6 bg-gray-300 mx-2"></div>
            </div>
            <!-- Print button: always visible -->
            <button onclick="window.print()"
                class="px-3 md:px-4 py-1.5 bg-green-600 hover:bg-green-700 text-white rounded text-sm font-bold shadow flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                <span class="hidden md:inline">Print CV</span>
                <span class="md:hidden">Print</span>
            </button>
        </div>
    </nav>

    <!-- Main Workspace -->
    <div id="main-workspace" class="flex flex-1 overflow-hidden">

        <!-- FORM PANEL (Left) -->
        <div id="form-panel" class="w-1/3 bg-white border-r flex flex-col no-print z-0 relative shadow-lg">
            <div class="p-4 bg-gray-50 border-b">
                <h2 class="text-lg font-semibold text-gray-700">Isi Data CV Anda</h2>
                <p class="text-xs text-gray-500">Perubahan akan langsung muncul di samping kanan.</p>
            </div>

            <div class="flex-1 overflow-y-auto p-6 form-area" id="form-container">
                <!-- Data Pribadi -->
                <div class="mb-8">
                    <h3 class="text-md font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-sm">1</span> Informasi Pribadi
                    </h3>
                    <div class="space-y-3">
                        <!-- Upload Foto -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-2">Foto Profil</label>
                            <div class="photo-upload-area">
                                <div id="photo-placeholder" class="photo-placeholder" onclick="document.getElementById('input-photo').click()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                    <span>Upload Foto</span>
                                </div>
                                <img id="photo-preview" class="photo-preview-circle" style="display:none;" src="" alt="Foto Profil" onclick="document.getElementById('input-photo').click()" title="Klik untuk ganti foto">
                                <input type="file" id="input-photo" accept="image/*" style="display:none;" onchange="handlePhotoUpload(this)">
                                <button id="btn-remove-photo" style="display:none;" onclick="removePhoto()" class="text-xs text-red-500 hover:text-red-700 underline">Hapus Foto</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Nama Lengkap</label>
                            <input type="text" id="input-name" oninput="updateCV()"
                                class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                                value="Budi Santoso">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Posisi Pekerjaan
                                (Title)</label>
                            <input type="text" id="input-title" oninput="updateCV()"

    <script>

                title: "Senior Software Engineer",
                email: "budi.santoso@email.com",
                phone: "+62 812 3456 7890",
                address: "Jakarta Selatan, Indonesia",
                summary: "Profesional IT dengan pengalaman lebih dari 5 tahun dalam pengembangan aplikasi web dan sistem manajemen. Memiliki keahlian kuat dalam JavaScript, Python, dan arsitektur cloud. Terbukti mampu memimpin tim kecil untuk menghasilkan produk teknologi yang efisien dan skalabel.",
                photo: null  // base64 string dari foto yang diupload
            },
            experiences: [
                {
                    id: 1,
                    title: "Senior Software Engineer",
                    company: "PT Teknologi Nusantara",
                    date: "Jan 2020 - Sekarang",
                    description: "- Memimpin tim beranggotakan 5 developer dalam merancang arsitektur microservices.\n- Meningkatkan performa aplikasi hingga 40% melalui optimasi database.\n- Berkolaborasi dengan tim produk untuk merilis fitur baru setiap 2 minggu."
                },
                {
                    id: 2,
                    title: "Web Developer",
                    company: "Startup Digital Maju",
                    date: "Mar 2017 - Des 2019",
                    description: "- Mengembangkan sistem CMS internal menggunakan React dan Node.js.\n- Mengimplementasikan desain UI/UX yang responsif dan user-friendly.\n- Melakukan testing dan debugging rutin."
                }
            ],
            education: [
                {
                    id: 1,
                    degree: "S1 Teknik Informatika",
                    school: "Universitas Indonesia",
                    date: "2013 - 2017",
                    description: "Lulus dengan predikat Cum Laude (IPK 3.85). Aktif dalam organisasi kemahasiswaan dan kompetisi programming."

        // --- RENDER FORM ---
        function renderFormLists() {
            const expContainer = document.getElementById('experience-forms');
            expContainer.innerHTML = '';
            cvData.experiences.forEach((exp, index) => {
                expContainer.innerHTML += `
                    <div class="p-3 border rounded bg-gray-50 relative group">
                        <button onclick="removeExperience(${exp.id})" class="absolute top-2 right-2 text-red-500 hover:text-red-700 text-xs hidden group-hover:block">Hapus</button>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase">Posisi</label>
                                <input type="text" oninput="updateExperience(${exp.id}, 'title', this.value)" value="${exp.title}" class="w-full border-b bg-transparent px-1 py-1 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase">Perusahaan</label>
                                <input type="text" oninput="updateExperience(${exp.id}, 'company', this.value)" value="${exp.company}" class="w-full border-b bg-transparent px-1 py-1 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Tanggal / Tahun</label>
                            <input type="text" oninput="updateExperience(${exp.id}, 'date', this.value)" value="${exp.date}" class="w-full border-b bg-transparent px-1 py-1 text-sm focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Deskripsi (Gunakan - untuk list)</label>
                            <textarea oninput="updateExperience(${exp.id}, 'description', this.value)" rows="3" class="w-full border rounded bg-white px-2 py-1 text-sm focus:outline-none focus:border-blue-500 mt-1">${exp.description}</textarea>
                        </div>
                    </div>
                `;
            });

            const eduContainer = document.getElementById('education-forms');
            eduContainer.innerHTML = '';
            cvData.education.forEach((edu) => {
                eduContainer.innerHTML += `
                    <div class="p-3 border rounded bg-gray-50 relative group">
                        <button onclick="removeEducation(${edu.id})" class="absolute top-2 right-2 text-red-500 hover:text-red-700 text-xs hidden group-hover:block">Hapus</button>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase">Gelar/Jurusan</label>
                                <input type="text" oninput="updateEducation(${edu.id}, 'degree', this.value)" value="${edu.degree}" class="w-full border-b bg-transparent px-1 py-1 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase">Institusi</label>
                                <input type="text" oninput="updateEducation(${edu.id}, 'school', this.value)" value="${edu.school}" class="w-full border-b bg-transparent px-1 py-1 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Tahun</label>

                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Keterangan Singkat</label>
                            <textarea oninput="updateEducation(${edu.id}, 'description', this.value)" rows="2" class="w-full border rounded bg-white px-2 py-1 text-sm focus:outline-none focus:border-blue-500 mt-1">${edu.description}</textarea>
                        </div>
                    </div>
                `;
            });
        }

        // --- UPDATE STATE FUNCTIONS ---
        function updateCV() {
            // Ambil dari basic inputs
            cvData.personal.name = document.getElementById('input-name').value;
            cvData.personal.title = document.getElementById('input-title').value;
            cvData.personal.email = document.getElementById('input-email').value;
            cvData.personal.phone = document.getElementById('input-phone').value;
            cvData.personal.address = document.getElementById('input-address').value;
            cvData.personal.summary = document.getElementById('input-summary').value;
            cvData.skills = document.getElementById('input-skills').value;

            renderCVPreview();
        }

        // --- PHOTO UPLOAD HANDLER ---
        function handlePhotoUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    cvData.personal.photo = e.target.result;
                    // Update UI preview di form
                    document.getElementById('photo-placeholder').style.display = 'none';
                    const preview = document.getElementById('photo-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('btn-remove-photo').style.display = 'inline-block';
                    renderCVPreview();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto() {
            cvData.personal.photo = null;
            document.getElementById('input-photo').value = '';
            document.getElementById('photo-preview').style.display = 'none';
            document.getElementById('photo-preview').src = '';
            document.getElementById('photo-placeholder').style.display = 'flex';
            document.getElementById('btn-remove-photo').style.display = 'none';
            renderCVPreview();
        }

        function updateExperience(id, field, value) {
            const exp = cvData.experiences.find(e => e.id === id);
            if (exp) {
                exp[field] = value;
                renderCVPreview();
            }
        }

        function updateEducation(id, field, value) {
            const edu = cvData.education.find(e => e.id === id);
            if (edu) {
                edu[field] = value;
                renderCVPreview();
            }
        }

        // --- ADD / REMOVE LIST ITEMS ---
        function addExperience() {
            const newId = cvData.experiences.length > 0 ? Math.max(...cvData.experiences.map(e => e.id)) + 1 : 1;
            cvData.experiences.push({ id: newId, title: "", company: "", date: "", description: "" });
            renderFormLists();
            renderCVPreview();
        }

        function removeExperience(id) {
            cvData.experiences = cvData.experiences.filter(e => e.id !== id);
            renderFormLists();
            renderCVPreview();
        }

        function addEducation() {
            const newId = cvData.education.length > 0 ? Math.max(...cvData.education.map(e => e.id)) + 1 : 1;
            cvData.education.push({ id: newId, degree: "", school: "", date: "", description: "" });
            renderFormLists();
            renderCVPreview();
        }

        function removeEducation(id) {
            cvData.education = cvData.education.filter(e => e.id !== id);
            renderFormLists();
            renderCVPreview();
        }

        // --- DESIGN SWITCHER ---
        function changeDesign(designNum) {
            cvData.design = designNum;

            // Update desktop button styles
            [1, 2, 3].forEach(num => {
                const btn = document.getElementById(`btn-dsn-${num}`);
                if (btn) {
                    if (num === designNum) {
                        btn.classList.replace('bg-gray-200', 'bg-blue-600');
                        btn.classList.replace('text-gray-700', 'text-white');
                        btn.classList.remove('hover:bg-gray-300');
                    } else {
                        btn.classList.replace('bg-blue-600', 'bg-gray-200');
                        btn.classList.replace('text-white', 'text-gray-700');
                        btn.classList.add('hover:bg-gray-300');
                    }
                }
                // Update mobile button styles
                const mobBtn = document.getElementById(`mob-btn-${num}`);
                if (mobBtn) {
                    if (num === designNum) mobBtn.classList.add('mob-dsn-active');
                    else mobBtn.classList.remove('mob-dsn-active');
                }
            });

            renderCVPreview();
        }

        // --- HELPER: Format text with dashes to HTML ul/li ---
        function formatListText(text) {
            if (!text) return '';
            const lines = text.split('\n');
            let isList = false;
            let html = '';

            lines.forEach(line => {
                const tLine = line.trim();
                if (tLine.startsWith('-')) {
                    if (!isList) { html += '<ul>'; isList = true; }
                    html += `<li>${tLine.substring(1).trim()}</li>`;
                } else {
                    if (isList) { html += '</ul>'; isList = false; }
                    if (tLine !== '') html += `<p>${tLine}</p>`;
                }
            });
            if (isList) html += '</ul>';
            return html;
        }

        // --- HELPER: SVG Icons ---
        function getIcon(type) {
            if (type === 'email') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px; height:14px; display:inline; vertical-align:-2px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>`;
            if (type === 'phone') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px; height:14px; display:inline; vertical-align:-2px;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>`;
            if (type === 'location') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px; height:14px; display:inline; vertical-align:-2px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`;
            return '';
        }

                                        <div class="item-top">
                                            <div class="item-title">${edu.degree}</div>
                                            <div class="item-date">${edu.date}</div>
                                        </div>
                                        <div class="item-subtitle">${edu.school}</div>

                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            // Re-scale A4 after content updates on mobile
            if (window.innerWidth < 769) requestAnimationFrame(scalePreview);
        }

        // --- MOBILE: TAB SWITCHING ---
        function switchTab(tab) {
            const formPanel = document.getElementById('form-panel');
            const previewPanel = document.getElementById('preview-panel');
            const tabForm = document.getElementById('tab-form');
            const tabPreview = document.getElementById('tab-preview');

            if (tab === 'form') {
                formPanel.classList.add('mobile-panel-active');
                previewPanel.classList.remove('mobile-panel-active');
                tabForm.classList.add('tab-active');
                tabPreview.classList.remove('tab-active');
            } else {
                previewPanel.classList.add('mobile-panel-active');
                formPanel.classList.remove('mobile-panel-active');
                tabPreview.classList.add('tab-active');
                tabForm.classList.remove('tab-active');
                requestAnimationFrame(scalePreview);
            }
        }

        // --- MOBILE: SCALE A4 TO FIT SCREEN WIDTH ---
        function scalePreview() {
            const cvContainer = document.getElementById('cv-preview-container');
            const scrollArea = document.getElementById('preview-scroll-area');
            if (!cvContainer || !scrollArea) return;

            if (window.innerWidth >= 769) {
                cvContainer.style.transform = '';
                cvContainer.style.marginBottom = '';
                return;
            }

            // Reset to natural size first
            cvContainer.style.transform = 'scale(1)';
            cvContainer.style.marginBottom = '';

            requestAnimationFrame(() => {
                const availableWidth = scrollArea.offsetWidth - 12;
                const naturalWidth = cvContainer.scrollWidth;
                const scale = Math.min(1, availableWidth / naturalWidth);

                if (scale < 1) {
                    const naturalHeight = cvContainer.scrollHeight;
                    cvContainer.style.transform = `scale(${scale})`;
                    cvContainer.style.transformOrigin = 'top center';
                    // Collapse whitespace that CSS transform leaves behind
                    cvContainer.style.marginBottom = `-${naturalHeight * (1 - scale)}px`;
                } else {
                    cvContainer.style.transform = '';
                    cvContainer.style.marginBottom = '';
                }
            });
        }

        // --- INITIALIZE ---
        window.onload = () => {
            renderFormLists();
            renderCVPreview();

            // Start on form tab on mobile
            if (window.innerWidth < 769) {
                switchTab('form');
            }

            // Handle orientation/resize changes
            window.addEventListener('resize', () => {
                if (window.innerWidth >= 769) {
                    // Restore desktop: both panels always visible
                    document.getElementById('form-panel').classList.remove('mobile-panel-active');
                    document.getElementById('preview-panel').classList.remove('mobile-panel-active');
                }
                scalePreview();
            });
        };

    </script>

    <!-- Mobile Tab Bar (last flex child = docked to bottom) -->
    <div class="mobile-tab-bar no-print" id="mobile-tab-bar">
        <button id="tab-form" class="mobile-tab-btn tab-active" onclick="switchTab('form')">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            Isi Data
        </button>
        <button id="tab-preview" class="mobile-tab-btn" onclick="switchTab('preview')">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            Preview CV
        </button>
    </div>
