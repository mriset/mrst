    { level: 3, text: "Pernah nggak kamu punya \"back-up plan\" (orang cadangan) kalau hubunganmu yang sekarang gagal?" },
    { level: 3, text: "Pernah nggak kamu stalking selingkuhannya pasanganmu dan mikir \"kok selingkuhannya downgrade banget\"?" },
    { level: 3, text: "Pernah nggak kamu pura-pura suka bola/K-Pop/Game cuma biar ada bahan obrolan sama doi?" },
    { level: 3, text: "Pernah nggak kamu berharap bisa amnesia ngelupain satu mantan yang bikin trauma?" },
    { level: 3, text: "Pernah nggak kamu membohongi diri sendiri dengan bilang \"dia pasti berubah kok\" padahal tau dia toxic?" },
    { level: 3, text: "Pernah nggak kamu ngerasa capek banget jatuh cinta dan pengen dijodohin aja biar praktis?" },
    { level: 3, text: "Pernah nggak kamu sengaja bikin story WA/IG disembunyikan (hide) dari semua orang KECUALI dia?" },
    { level: 3, text: "Pernah nggak kamu pakai akun temen buat nonton story IG mantan biar nggak masuk viewers?" },
    { level: 3, text: "Pernah nggak kamu ngerasa insecure pas diajak jalan sama gebetan yang circle-nya kelihatan \"hedon/kaya\"?" },
    { level: 3, text: "Pernah nggak kamu putus sama orang gara-gara omongan keluarga atau temanmu yang nggak setuju?" },
    { level: 3, text: "Pernah nggak kamu kepikiran mau balikan, udah ngetik panjang lebar, tapi akhirnya dihapus dan nggak jadi dikirim?" },
    { level: 3, text: "Pernah nggak kamu membenci dirimu sendiri karena selalu mengulangi kesalahan yang sama?" },
    { level: 3, text: "Pernah nggak kamu memaafkan seseorang secara langsung, tapi di dalam hati dendamnya belum hilang?" },
    { level: 3, text: "Pernah nggak kamu ngerasa bahwa hari-hari yang kamu jalani sekarang cuma mode \"autopilot\" (kosong tanpa arah)?" },
    { level: 3, text: "Pernah nggak kamu berharap bisa balik ke masa SMA/Kuliah karena ngerasa itulah puncak kebahagiaanmu?" },
    { level: 3, text: "Pernah nggak kamu ngerasa nggak pantes dapet cinta dari orang tua atau pasanganmu?" },
    { level: 3, text: "Pernah nggak kamu menyabotase pertemanan karena merasa \"dia terlalu baik buat temenan sama gue\"?" },
    { level: 3, text: "Pernah nggak kamu ngerasa kalau orang-orang mulai menjauh saat tau betapa rusaknya mentalmu?" },
    { level: 3, text: "Pernah nggak kamu takut banget jadi dewasa karena ngerasa belum siap tanggung jawab?" },
    { level: 3, text: "Pernah nggak kamu memendam rasa iri dengki ke saudara kandung sendiri?" },
    { level: 3, text: "Pernah nggak kamu sadar bahwa kelemahan terbesarmu adalah selalu butuh validasi dari orang lain?" },
    { level: 3, text: "Pernah nggak kamu merasa kesepian justru pas lagi kumpul bareng sahabat/keluarga besar?" },
    { level: 3, text: "Pernah nggak kamu diam-diam nangis di kamar mandi habis dapet kritik pedas dari atasan/dosen?" },
    { level: 3, text: "Pernah nggak kamu punya trauma masa lalu yang nggak pernah kamu ceritain ke psikolog atau orang terdekat?" },
    { level: 3, text: "Pernah nggak kamu ngerasa kalau kamu nggak pernah benar-benar mencintai diri sendiri?" },
    { level: 3, text: "Pernah nggak kamu menyesali satu keputusan besar di masa lalu yang ngeubah seluruh jalan hidupmu sekarang?" },
    { level: 3, text: "Pernah nggak kamu kepikiran apa jadinya kalau kamu nggak pernah dilahirkan ke dunia ini?" },

        let audioCtx;
        let noiseBuffer;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (!noiseBuffer && audioCtx) {
                const bufferSize = audioCtx.sampleRate * 0.15;
                noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
            }
        }

        function playTickSound() {
            if (!audioCtx || !noiseBuffer) return;
            const noiseSrc = audioCtx.createBufferSource();
            noiseSrc.buffer = noiseBuffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05); 
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(1.5, audioCtx.currentTime + 0.005);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08); 
            noiseSrc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noiseSrc.start(audioCtx.currentTime);
            noiseSrc.stop(audioCtx.currentTime + 0.1);
        }

        function playStopSound() {
            if (!audioCtx) return;
            const frequencies = [146.83, 174.61, 220.00]; 
            frequencies.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                const startTime = audioCtx.currentTime + (index * 0.05); 
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.9, startTime + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 2.5); 
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + 3.0);
            });
        }

        // === MULTIPLAYER STATE ===

        function saveSession() {

                pid: myPlayerId,

            }));

            document.getElementById(screenId).classList.add('active-screen');
        }

        function generateRoomCode() {
            let result = '';
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            for (let i = 0; i < 4; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        function createRoom() {
            initAudio();
            const pinInput = prompt("Masukkan PIN untuk membuat room:");
            if (pinInput !== "183729") {
                alert("PIN salah!");
                return;
            }
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) return alert("Pilih nama dulu!");
            myName = nameInput;
            myRoomCode = generateRoomCode();
            isModerator = true;
            
            roomRef = db.ref('rooms/' + myRoomCode);
            roomRef.set({
                moderator: myPlayerId,
                status: 'lobby',
                players: { [myPlayerId]: { name: myName } }
            }).then(() => {
                saveSession();
                listenToRoom();
            }).catch(e => alert("Gagal buat room: " + e.message));
        }

        function joinRoom() {
            initAudio();
            const nameInput = document.getElementById('player-name').value.trim();
            const codeInput = document.getElementById('room-code-input').value.trim().toUpperCase();
            if (!nameInput) return alert("Pilih nama dulu!");
            if (!codeInput || codeInput.length !== 4) return alert("Kode room tidak valid!");
            
            db.ref('rooms/' + codeInput).once('value', snapshot => {
                if (!snapshot.exists()) return alert("Room tidak ditemukan!");
                
                myName = nameInput;
                myRoomCode = codeInput;
                isModerator = false;
                
                roomRef = db.ref('rooms/' + myRoomCode);
                pRef = roomRef.child('players/' + myPlayerId);
                
                pRef.set({ name: myName }).then(() => {
                    saveSession();
                    listenToRoom();
                }).catch(e => alert("Gagal gabung room: " + e.message));
            });
        }

        function resetToHome() {
            if (roomRef) roomRef.off();
            roomRef = null;
            pRef = null;
            myRoomCode = '';
            isModerator = false;
            currentRoomData = null;
            clearSession();
            showScreen('home-screen');
        }

        // Hanya dipanggil saat tombol Keluar ditekan secara eksplisit
        function leaveRoom() {
            if (roomRef) {
                if (isModerator) {
                    roomRef.remove(); // tutup room, semua player otomatis ter-kick
                } else {
                    if (pRef) pRef.remove(); // hanya hapus diri sendiri
                }
            }
            resetToHome();
        }

        function confirmLeave() {
            if (isModerator) {
                if (!confirm("Kamu adalah Moderator. Keluar akan MENUTUP ROOM dan mengeluarkan semua pemain. Yakin?")) return;
            } else {
                if (!confirm("Yakin mau keluar dari room?")) return;
            }
            leaveRoom();
        }

        function listenToRoom() {
            roomRef.on('value', snapshot => {
                const data = snapshot.val();
                if (!data) {
                    alert("Room telah ditutup!");
                    resetToHome();
                    return;
                }
                
                // If moderator is no longer in players list, or data.moderator is gone, room is dead
                if (!data.players || !data.players[data.moderator]) {
                    alert("Moderator keluar. Room ditutup.");
                    if (!isModerator) pRef.remove();
                    resetToHome();
                    return;
                }
                
                isModerator = (data.moderator === myPlayerId);
                currentRoomData = data;
                updateUI(data);
            });
        }

                // Shuffle logic override disable

                    btnNext.disabled = true;

                    btnNext.disabled = (data.status === 'voting' || data.status === 'shuffling' || data.status === 'results');
                }

                if (data.status === 'playing') {
                    votePanel.classList.remove('show');
                    resultsPanel.classList.remove('show');
                    if (data.currentCard && !isShuffling) {
                        renderStaticCard(data.currentCard);
                    }

                else if (data.status === 'shuffling') {
                    votePanel.classList.remove('show');
                    resultsPanel.classList.remove('show');
                    if (!isShuffling && data.shuffleSignal) {
                        handleShuffleSignal(data.shuffleSignal);
                    }

                else if (data.status === 'voting') {
                    votePanel.classList.add('show');
                    resultsPanel.classList.remove('show');
                    if (data.currentCard && !isShuffling) renderStaticCard(data.currentCard);
                    
                    const votesCount = data.vote && data.vote.votes ? Object.keys(data.vote.votes).length : 0;

        function startGame() {
            if (!isModerator) return;
            // Generate shuffled deck once
            shuffledDeck = [...questions];
            for (let i = shuffledDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledDeck[i], shuffledDeck[j]] = [shuffledDeck[j], shuffledDeck[i]];
            }
            deckIndex = 0;
            
            roomRef.update({
                status: 'playing',
                currentCard: { level: 0, text: "Gunakan tombol ACAK KARTU di bawah untuk membagikan kartu pertama." }
            });
        }

        function triggerShuffle() {
            if (!isModerator) return;
            if (isShuffling) return;
            if (currentRoomData.status !== 'playing') return;
            
            // Generate random card or Pick from deck
            // Just use random directly to keep it simple and stateless
            const randomCard = questions[Math.floor(Math.random() * questions.length)];
            const signalId = 'sig_' + Math.random().toString(36).substr(2, 9);
            
            roomRef.update({
                status: 'shuffling',
                shuffleSignal: {
                    id: signalId,
                    card: randomCard
                }
            });
        }

        function handleShuffleSignal(signal) {
            if (lastProcessedShuffleSignalId === signal.id) return;
            lastProcessedShuffleSignalId = signal.id;
            
            const cardView = document.getElementById('hp-card-view');
            isShuffling = true;
            cardView.classList.add('animate-shuffle');
            
            let shuffleCount = 0;
            const maxShuffles = 22; 
            const shuffleSpeed = 90; 
            
            const shuffleInterval = setInterval(() => {
                const randomCard = questions[Math.floor(Math.random() * questions.length)];
                cardView.className = `card-hp lvl-${randomCard.level} animate-shuffle`;
                cardView.innerHTML = getCardHTML(randomCard.level, randomCard.text);

                if (window.navigator && window.navigator.vibrate) { window.navigator.vibrate(15); } 
                playTickSound(); 

                shuffleCount++;
                if (shuffleCount >= maxShuffles) {
                    clearInterval(shuffleInterval);

                    cardView.className = `card-hp lvl-${signal.card.level}`;
                    cardView.innerHTML = getCardHTML(signal.card.level, signal.card.text);
                    void cardView.offsetWidth; 
                    cardView.classList.add('animate-pop');

                    if (window.navigator && window.navigator.vibrate) { window.navigator.vibrate([80, 40, 100]); }
                    playStopSound(); 

                    isShuffling = false;
                    
                    if (isModerator && currentRoomData && currentRoomData.status === 'shuffling') {
                         roomRef.update({ status: 'playing', currentCard: signal.card });
                    }
                }
            }, shuffleSpeed);
        }

            if (!isModerator) return;
            const playersCount = currentRoomData.players ? Object.keys(currentRoomData.players).length : 0;
            const votesCount = currentRoomData.vote && currentRoomData.vote.votes ? Object.keys(currentRoomData.vote.votes).length : 0;
            if (votesCount < playersCount) return; 
            
            roomRef.update({
                status: 'results'
            });
        }

        function resetVote() {
            if (!isModerator) return;
            roomRef.update({
                status: 'playing',
                vote: null
            });
        }

    </script>
</body>
